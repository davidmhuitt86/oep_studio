name: oep_studio
description: "OEP Studio — the graphical desktop application for the Open Engineering Platform."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Routing (SDD-003 Navigation Framework, SDD-004 Workspace Framework)
  go_router: ^14.6.2

  # State management (Studio Services layer)
  flutter_riverpod: ^2.6.1

  # Foundation Bridge (SDD-006): dart:ffi marshaling helpers (Utf8, malloc).
  ffi: ^2.1.3

  # Native folder picker for the Open Repository workflow (STUDIO-TASK-000004).
  file_selector: ^1.0.3

  # PDF Source Viewer (STUDIO-TASK-000019) — page rendering, navigation, zoom.
  pdfrx: ^2.4.7

  # OCR Session Cache (Work Package 013 STUDIO-TASK-000037) — SHA-256
  # content fingerprinting for cache invalidation. Dart-team-maintained,
  # BSD-3, no native code.
  crypto: ^3.0.6

  # AnthropicProvider (Work Package 018 STUDIO-TASK-000056) — the
  # Messages API request/response transport. Dart-team-maintained.
  http: ^1.2.2

  cupertino_icons: ^1.0.8

  # Diagram Studio (WORK_PACKAGE_024, ENGINE-TASK-000108): the
  # Engineering Engine's public API. Studio never imports anything under
  # `package:engineering_engine/core/` — only this single root barrel.
  engineering_engine:
    path: ../oep_engine

  # Symbol rendering for Diagram Studio's canvas (the Engine ships symbol
  # *geometry* data only, per SDD-025/026 — no Flutter in `lib/core`).
  # Same version the Engineering Engine Demonstration Host already uses.
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/icons/
  #   - assets/images/
  #   - assets/themes/
